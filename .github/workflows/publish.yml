name: Publish Org Blog
on: 
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Emacs
        uses: purcell/setup-emacs@master
        with:
          version: 29.1
          
      - name: Render Org files to HTML
        run: emacs --batch --load build-blog.el
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./www
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4